{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white"><h4 class="mb-0"><i class="fas fa-user"></i> Mon profil</h4></div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3"><label class="form-label">Nom</label><input type="text" name="nom" class="form-control" value="{{ utilisateur.nom }}" required></div>
                    <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" value="{{ utilisateur.email }}" disabled></div>
                    <div class="mb-3"><label class="form-label">Téléphone</label><input type="tel" name="telephone" class="form-control" value="{{ utilisateur.telephone }}" required></div>
                    <div class="mb-3"><label class="form-label">Rôle</label><input type="text" class="form-control" value="{{ 'Conducteur' if utilisateur.type_utilisateur == 'conducteur' else 'Passager' }}" disabled></div>
                    <div class="mb-3"><label class="form-label">Note moyenne</label><input type="text" class="form-control" value="{{ utilisateur.note_moyenne|round(1) }}/5 ({{ utilisateur.nombre_avis }} avis)" disabled></div>
                    <button type="submit" class="btn btn-primary w-100">Mettre à jour</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
