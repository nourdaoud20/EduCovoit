{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center fade-in">
    <div class="col-md-5 col-lg-4">
        <div class="card" style="border-radius: 20px; overflow: hidden;">
            <div style="background: linear-gradient(135deg, #003F87 0%, #0056b3 100%); padding: 2rem; text-align: center; color: white;">
                <i class="fas fa-sign-in-alt" style="font-size: 2.5rem; margin-bottom: 1rem; display: block;"></i>
                <h3 style="color: white; margin-bottom: 0;">Connexion</h3>
            </div>
            <div class="card-body" style="padding: 2rem;">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input type="email" name="email" class="form-control" required placeholder="votre.email@universite.tn">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-lock"></i> Mot de passe
                        </label>
                        <input type="password" name="mot_de_passe" class="form-control" required placeholder="Votre mot de passe sécurisé">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg" style="font-weight: 600;">
                        <i class="fas fa-sign-in-alt"></i> Se connecter
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0">Pas encore inscrit ? 
                    <a href="{{ url_for('inscription') }}" style="font-weight: 600; color: #003F87;">
                        S'inscrire maintenant
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
