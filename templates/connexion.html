{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header bg-primary text-white"><h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> Connexion</h4></div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Mot de passe</label><input type="password" name="mot_de_passe" class="form-control" required></div>
                    <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                </form>
                <p class="mt-3 text-center">Pas encore inscrit ? <a href="{{ url_for('inscription') }}">S'inscrire</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
