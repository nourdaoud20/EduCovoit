{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-6 col-lg-5">
        <div class="card" style="border-radius: 20px; overflow: hidden;">
            <div style="background: linear-gradient(135deg, #ff9800 0%, #ff7043 100%); padding: 2rem; text-align: center; color: white;">
                <i class="fas fa-edit" style="font-size: 2.5rem; margin-bottom: 1rem; display: block;"></i>
                <h3 style="color: white; margin-bottom: 0;">Modifier le trajet</h3>
            </div>
            <div class="card-body" style="padding: 2rem;">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-location-dot"></i> Départ</label>
                        <input type="text" name="depart" class="form-control" value="{{ trajet.depart }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-map-pin"></i> Arrivée</label>
                        <input type="text" name="arrivee" class="form-control" value="{{ trajet.arrivee }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label"><i class="far fa-calendar-alt"></i> Date</label>
                            <input type="date" name="date" class="form-control" value="{{ trajet.date }}" min="{{ today }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label"><i class="far fa-clock"></i> Heure</label>
                            <input type="time" name="heure" class="form-control" value="{{ trajet.heure }}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label"><i class="fas fa-users"></i> Places</label>
                            <input type="number" name="places" min="1" max="4" class="form-control" value="{{ trajet.places_disponibles }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label"><i class="fas fa-money-bill-wave"></i> Prix (TND)</label>
                            <input type="number" name="prix" step="0.5" min="0" class="form-control" value="{{ trajet.prix }}" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 btn-lg" style="font-weight: 600; margin-top: 1rem;">
                        <i class="fas fa-save"></i> Modifier le trajet
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
