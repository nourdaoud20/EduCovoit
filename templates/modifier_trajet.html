{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning"><h4 class="mb-0"><i class="fas fa-edit"></i> Modifier le trajet</h4></div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3"><label class="form-label">Départ</label><input type="text" name="depart" class="form-control" value="{{ trajet.depart }}" required></div>
                    <div class="mb-3"><label class="form-label">Arrivée</label><input type="text" name="arrivee" class="form-control" value="{{ trajet.arrivee }}" required></div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="form-label">Date</label><input type="date" name="date" class="form-control" value="{{ trajet.date }}" min="{{ today }}" required></div>
                        <div class="col-md-6 mb-3"><label class="form-label">Heure</label><input type="time" name="heure" class="form-control" value="{{ trajet.heure }}" required></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="form-label">Places</label><input type="number" name="places" min="1" max="4" class="form-control" value="{{ trajet.places_disponibles }}" required></div>
                        <div class="col-md-6 mb-3"><label class="form-label">Prix (TND)</label><input type="number" name="prix" step="0.5" min="0" class="form-control" value="{{ trajet.prix }}" required></div>
                    </div>
                    <button type="submit" class="btn btn-warning w-100"><i class="fas fa-save"></i> Modifier</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
