{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center fade-in">
    <div class="col-md-6 col-lg-5">
        <div class="card" style="border-radius: 20px; overflow: hidden;">
            <div style="background: linear-gradient(135deg, #003F87 0%, #0056b3 100%); padding: 2rem; text-align: center; color: white;">
                <i class="fas fa-user-plus" style="font-size: 2.5rem; margin-bottom: 1rem; display: block;"></i>
                <h3 style="color: white; margin-bottom: 0;">Inscription</h3>
            </div>
            <div class="card-body" style="padding: 2rem;">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-user"></i> Nom complet
                        </label>
                        <input type="text" name="nom" class="form-control" required placeholder="Ex: Ahmed Ben Ali">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-envelope"></i> Email universitaire
                        </label>
                        <input type="email" name="email" class="form-control" required placeholder="Ex: ahmed.ali@universite.tn">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-phone"></i> Téléphone
                        </label>
                        <input type="tel" name="telephone" class="form-control" required placeholder="Ex: +216 XX XXX XXX">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-lock"></i> Mot de passe
                        </label>
                        <input type="password" name="mot_de_passe" class="form-control" required placeholder="Au moins 6 caractères">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-car"></i> Je suis
                        </label>
                        <select name="type_utilisateur" class="form-control" required>
                            <option value="passager">Passager (Je cherche des trajets)</option>
                            <option value="conducteur">Conducteur (Je propose des trajets)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg" style="font-weight: 600;">
                        <i class="fas fa-check-circle"></i> S'inscrire
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0">Déjà inscrit ? 
                    <a href="{{ url_for('connexion') }}" style="font-weight: 600; color: #003F87;">
                        Se connecter
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
